      content="A fast, local-first resume builder with Markdown editing, live preview, and PDF export."
    />
    <link rel="canonical" href="https://cybershiba.cn/" />
    <meta property="og:url" content="https://cybershiba.cn/" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Resume Maker",
        "applicationCategory": "BusinessApplication",
        "applicationSubCategory": "Resume Builder",
        "operatingSystem": "Web",
        "browserRequirements": "Requires JavaScript",
        "description": "A browser-based resume editor that lets you write in Markdown, preview changes live, and export polished resumes as PDF or HTML.",
        "url": "https://cybershiba.cn/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Markdown resume editor",
          "Live preview",
          "PDF export",
          "HTML export",
          "Custom resume templates",
          "Local-first storage"
        ]
      }
    </script>
    <script>
      const canonicalUrl = `${window.location.origin}${window.location.pathname}`;
      const canonicalElement = document.querySelector('link[rel="canonical"]');
      const ogUrlElement = document.querySelector('meta[property="og:url"]');

      if (canonicalElement) {
        canonicalElement.setAttribute("href", canonicalUrl);
      }

      if (ogUrlElement) {
        ogUrlElement.setAttribute("content", canonicalUrl);
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
